name: CI/CD — Desenvolvimento

on:
  push:
    branches: [dev, 'feature/**']

jobs:
  test:
    name: Testes e cobertura
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Executar testes e verificar cobertura
        run: mvn verify --no-transfer-progress

  deploy:
    name: Deploy Railway (development)
    needs: test
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Railway CLI
        run: npm install -g @railway/cli

      - name: Validar secrets do Railway
        run: |
          test -n "$RAILWAY_TOKEN"
          test -n "$RAILWAY_SERVICE"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_DEV }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE_DEV }}

      - name: Deploy para Railway (development)
        run: railway up --service "$RAILWAY_SERVICE" --environment development --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_DEV }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE_DEV }}
